<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroStock — Electrical Shop Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --graphite-900:#14181B;
    --graphite-800:#1E2427;
    --graphite-700:#2A3135;
    --graphite-600:#38403F;
    --copper:#C1793D;
    --copper-bright:#E0954F;
    --amber:#F0AD3E;
    --circuit-green:#4FAE7A;
    --signal-red:#D9584C;
    --paper:#EDEAE3;
    --muted:#93A0A3;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'IBM Plex Sans',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(193,121,61,0.08), transparent 45%),
      var(--graphite-900);
    color:var(--paper);
    font-family:var(--font-body);
    line-height:1.5;
    min-height:100vh;
  }

  a{color:inherit;}
  button{font-family:inherit;}

  /* ---------- layout shell ---------- */
  .shell{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  /* ---------- header / busbar ---------- */
  header.busbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    padding:18px 22px;
    background:linear-gradient(180deg, var(--graphite-800), var(--graphite-700));
    border:1px solid var(--graphite-600);
    border-radius:10px;
    position:relative;
    overflow:hidden;
    flex-wrap:wrap;
  }
  header.busbar::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:6px;
    background:repeating-linear-gradient(180deg, var(--copper) 0 10px, var(--amber) 10px 20px);
    opacity:.8;
  }
  .brand{display:flex;align-items:baseline;gap:12px;padding-left:10px;}
  .brand .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.14em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .brand h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:26px;
    margin:0;
    letter-spacing:-.01em;
  }
  .brand h1 span{color:var(--copper-bright);}

  .header-meta{
    display:flex;gap:22px;align-items:center;font-family:var(--font-mono);font-size:12px;color:var(--muted);
  }
  .header-meta .dot{width:7px;height:7px;border-radius:50%;background:var(--circuit-green);display:inline-block;margin-right:6px;box-shadow:0 0 6px var(--circuit-green);}

  /* ---------- controls ---------- */
  .controls{
    margin-top:22px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }
  .search-wrap{
    flex:1;
    min-width:220px;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    padding:12px 14px 12px 38px;
    background:var(--graphite-800);
    border:1px solid var(--graphite-600);
    border-radius:8px;
    color:var(--paper);
    font-size:14px;
    font-family:var(--font-body);
  }
  .search-wrap input:focus{outline:2px solid var(--copper-bright);outline-offset:1px;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted);}

  .sort-select{
    padding:11px 14px;
    background:var(--graphite-800);
    border:1px solid var(--graphite-600);
    border-radius:8px;
    color:var(--paper);
    font-family:var(--font-mono);
    font-size:12px;
  }
  .sort-select:focus-visible, .search-wrap input:focus-visible{outline:2px solid var(--copper-bright);}

  /* category pills styled like breaker toggles */
  .categories{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:14px;
  }
  .pill{
    font-family:var(--font-mono);
    font-size:11.5px;
    letter-spacing:.03em;
    padding:8px 13px;
    border-radius:6px;
    border:1px solid var(--graphite-600);
    background:var(--graphite-800);
    color:var(--muted);
    cursor:pointer;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .pill::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--graphite-600);
  }
  .pill:hover{border-color:var(--copper);color:var(--paper);}
  .pill.active{
    background:var(--copper);
    color:#1a120a;
    border-color:var(--copper);
    font-weight:600;
  }
  .pill.active::before{background:#1a120a;}

  @media (prefers-reduced-motion: no-preference){
    .pill{transition:background .15s ease, color .15s ease, border-color .15s ease;}
  }

  /* ---------- most used strip ---------- */
  .most-used{
    margin-top:26px;
    padding:16px 18px;
    background:linear-gradient(90deg, rgba(240,173,62,0.09), transparent);
    border:1px solid rgba(240,173,62,0.25);
    border-radius:10px;
    display:none;
  }
  .most-used.show{display:block;}
  .most-used h2{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--amber);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .most-used-row{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:4px;
  }
  .chip{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--graphite-800);
    border:1px solid var(--graphite-600);
    padding:8px 12px;
    border-radius:20px;
    font-size:12.5px;
    white-space:nowrap;
  }
  .chip .bulb{width:13px;height:13px;flex:none;}
  .chip .stock-tag{font-family:var(--font-mono);color:var(--muted);font-size:11px;}

  /* ---------- results meta ---------- */
  .results-meta{
    margin:22px 2px 12px;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
  }

  /* ---------- grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:14px;
  }

  .card{
    background:var(--graphite-800);
    border:1px solid var(--graphite-600);
    border-radius:10px;
    padding:16px;
    position:relative;
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:border-color .15s ease, transform .15s ease;
  }
  .card:hover{border-color:var(--copper);}
  @media (prefers-reduced-motion: no-preference){
    .card:hover{transform:translateY(-2px);}
  }

  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .card-cat{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--copper-bright);
  }
  .card-name{
    font-family:var(--font-display);
    font-weight:600;
    font-size:15.5px;
    line-height:1.3;
    margin:0;
  }
  .card-sub{font-size:12.5px;color:var(--muted);}

  .star-btn{
    background:none;
    border:none;
    cursor:pointer;
    padding:2px;
    flex:none;
    border-radius:6px;
  }
  .star-btn:focus-visible{outline:2px solid var(--copper-bright);}
  .bulb{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.6;transition:stroke .15s ease, fill .15s ease, filter .15s ease;}
  .star-btn[aria-pressed="true"] .bulb{
    stroke:var(--amber);
    fill:rgba(240,173,62,0.35);
    filter:drop-shadow(0 0 5px rgba(240,173,62,0.7));
  }

  .card-specs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
  }
  .spec-tag{
    border:1px solid var(--graphite-600);
    padding:3px 7px;
    border-radius:5px;
  }

  .card-bottom{
    margin-top:auto;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:10px;
  }
  .price{
    font-family:var(--font-mono);
    font-size:15px;
    font-weight:600;
    color:var(--paper);
  }
  .price small{color:var(--muted);font-weight:400;font-size:10.5px;}

  .stock-meter{width:96px;}
  .stock-label{
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    margin-bottom:4px;
  }
  .meter-track{
    height:6px;
    background:var(--graphite-700);
    border-radius:4px;
    overflow:hidden;
  }
  .meter-fill{height:100%;border-radius:4px;}
  .meter-fill.ok{background:var(--circuit-green);}
  .meter-fill.low{background:var(--amber);}
  .meter-fill.critical{background:var(--signal-red);}

  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-family:var(--font-mono);
    font-size:13px;
  }

  footer{
    margin-top:50px;
    padding-top:20px;
    border-top:1px solid var(--graphite-700);
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }

  @media (max-width:520px){
    .shell{padding:18px 14px 60px;}
    header.busbar{padding:16px;}
    .brand h1{font-size:21px;}
    .header-meta{display:none;}
  }
</style>
</head>

<div class="shell">

    <div class="brand">

  <div class="grid" id="productGrid"></div>

  <footer>
    <span>ElectroStock — inventory reference, electrical retail</span>
    <span>Star data saved locally in this browser</span>
  </footer>

</div>

============================================================ */
const STORAGE_KEY = 'electrostock_starred_v1';
let starred = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let activeCategory = 'all';
let searchTerm = '';
let sortMode = 'name';

function saveStarred(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...starred]));
}

/* ============================================================
   RENDER: category pills
============================================================ */
function renderCategoryPills(){
  const wrap = document.getElementById('categoryPills');
  const all = [{id:'all', label:'All Items'}, ...CATEGORIES];
  wrap.innerHTML = '';
  all.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (activeCategory === cat.id ? ' active' : '');
    btn.textContent = cat.label;
    btn.setAttribute('aria-pressed', activeCategory === cat.id);
    btn.addEventListener('click', () => {
      activeCategory = cat.id;
      renderCategoryPills();
      renderGrid();
    });
    wrap.appendChild(btn);
  });
}

/* ============================================================
   BULB ICON (signature element)
============================================================ */
function bulbSVG(){
  return `<svg class="bulb" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.6 10.8c.6.45 1.1 1.15 1.1 1.95V16h5v-.25c0-.8.5-1.5 1.1-1.95A6 6 0 0 0 12 3Z"/>
  </svg>`;
}

/* ============================================================
   RENDER: most used strip
============================================================ */
function renderMostUsed(){
  const section = document.getElementById('mostUsedSection');
  const row = document.getElementById('mostUsedRow');
  const items = PRODUCTS.filter(p => starred.has(p.id));

  if(items.length === 0){
    section.classList.remove('show');
    row.innerHTML = '';
    return;
  }
  section.classList.add('show');
  row.innerHTML = items.map(p => `
    <div class="chip">
      ${bulbSVG().replace('class="bulb"', 'class="bulb" style="stroke:var(--amber);fill:rgba(240,173,62,0.35);width:14px;height:14px"')}
      <span>${p.name}</span>
      <span class="stock-tag">${p.stock} ${p.unit}</span>
    </div>
  `).join('');
}

/* ============================================================
   RENDER: product grid
============================================================ */
function stockClass(p){
  if(p.stock <= p.threshold * 0.5) return 'critical';
  if(p.stock <= p.threshold) return 'low';
  return 'ok';
}

function renderGrid(){
  const grid = document.getElementById('productGrid');
  const countMeta = document.getElementById('itemCountMeta');
  const resultsCount = document.getElementById('resultsCount');

  let list = PRODUCTS.filter(p => {
    const matchesCategory = activeCategory === 'all' || p.category === activeCategory;
    const haystack = (p.name + ' ' + p.brand + ' ' + p.spec).toLowerCase();
    const matchesSearch = haystack.includes(searchTerm.toLowerCase());
    return matchesCategory && matchesSearch;
  });

  switch(sortMode){
    case 'stock-low': list.sort((a,b) => a.stock - b.stock); break;
    case 'price-low': list.sort((a,b) => a.price - b.price); break;
    case 'price-high': list.sort((a,b) => b.price - a.price); break;
    case 'starred': list.sort((a,b) => (starred.has(b.id)?1:0) - (starred.has(a.id)?1:0)); break;
    default: list.sort((a,b) => a.name.localeCompare(b.name));
  }

  countMeta.textContent = `${PRODUCTS.length} items in catalog`;
  resultsCount.textContent = `Showing ${list.length} of ${PRODUCTS.length} items`;

  if(list.length === 0){
    grid.innerHTML = `<div class="empty-state">No items match "${searchTerm}". Try a different search or category.</div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const isStarred = starred.has(p.id);
    const sClass = stockClass(p);
    const pct = Math.min(100, Math.round((p.stock / (p.threshold * 3)) * 100));
    return `
      <article class="card">
        <div class="card-top">
          <div>
            <div class="card-cat">${CATEGORIES.find(c => c.id === p.category)?.label || p.category}</div>
            <h3 class="card-name">${p.name}</h3>
            <div class="card-sub">${p.brand}</div>
          </div>
          <button class="star-btn" aria-pressed="${isStarred}" aria-label="Mark ${p.name} as most used" data-id="${p.id}">
            ${bulbSVG()}
          </button>
        </div>
        <div class="card-specs">
          <span class="spec-tag">${p.spec}</span>
          <span class="spec-tag">per ${p.unit}</span>
        </div>
        <div class="card-bottom">
          <div class="price">₹${p.price.toLocaleString('en-IN')}<br><small>per ${p.unit}</small></div>
          <div class="stock-meter">
            <div class="stock-label"><span>${p.stock} in stock</span></div>
            <div class="meter-track"><div class="meter-fill ${sClass}" style="width:${pct}%"></div></div>
          </div>
        </div>
      </article>
    `;
  }).join('');

  grid.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = Number(btn.dataset.id);
      if(starred.has(id)) starred.delete(id); else starred.add(id);
      saveStarred();
      renderMostUsed();
      renderGrid();
    });
  });
}

/* ============================================================
   EVENTS
============================================================ */
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderGrid();
});
document.getElementById('sortSelect').addEventListener('change', (e) => {
  sortMode = e.target.value;
  renderGrid();
});

/* ============================================================
   INIT
============================================================ */
renderCategoryPills();
renderMostUsed();
renderGrid();
</script>
</body>
</html>
